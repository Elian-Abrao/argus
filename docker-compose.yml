x-json-logging: &json-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - argus-net
    ports:
      - "5544:5432"
    logging: *json-logging

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - argus-net
    ports:
      - "5678:5672"
      - "15678:15672"
    logging: *json-logging

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LOGGER_API_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${LOGGER_API_MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - argus-net
    ports:
      - "${LOGGER_MINIO_API_HOST_PORT:-9010}:9000"
      - "${LOGGER_MINIO_CONSOLE_HOST_PORT:-9011}:9001"
    logging: *json-logging

  argus-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      LOGGER_API_DATABASE_URL: ${LOGGER_API_DATABASE_URL}
      LOGGER_API_RABBITMQ_URL: ${LOGGER_API_RABBITMQ_URL}
      LOGGER_API_EMAIL_RETENTION_DAYS_DEFAULT: ${LOGGER_API_EMAIL_RETENTION_DAYS_DEFAULT:-7}
      LOGGER_API_EMAIL_RETENTION_CLEANUP_ENABLED: ${LOGGER_API_EMAIL_RETENTION_CLEANUP_ENABLED:-true}
      LOGGER_API_EMAIL_RETENTION_CLEANUP_INTERVAL_SECONDS: ${LOGGER_API_EMAIL_RETENTION_CLEANUP_INTERVAL_SECONDS:-3600}
      LOGGER_API_EMAIL_RETENTION_CLEANUP_BATCH_SIZE: ${LOGGER_API_EMAIL_RETENTION_CLEANUP_BATCH_SIZE:-500}
      LOGGER_API_MINIO_ENDPOINT: ${LOGGER_API_MINIO_ENDPOINT:-minio:9000}
      LOGGER_API_MINIO_ACCESS_KEY: ${LOGGER_API_MINIO_ACCESS_KEY:-minioadmin}
      LOGGER_API_MINIO_SECRET_KEY: ${LOGGER_API_MINIO_SECRET_KEY:-minioadmin}
      LOGGER_API_MINIO_BUCKET: ${LOGGER_API_MINIO_BUCKET:-logger-email-attachments}
      LOGGER_API_MINIO_SECURE: ${LOGGER_API_MINIO_SECURE:-false}
      LOGGER_API_JWT_SECRET: ${LOGGER_API_JWT_SECRET}
      LOGGER_API_COOKIE_SECURE: ${LOGGER_API_COOKIE_SECURE:-true}
      ARGUS_PLATFORM_NAME: ${ARGUS_PLATFORM_NAME:-Argus}
      ARGUS_AI_NAME: ${ARGUS_AI_NAME:-Argus AI}
    depends_on:
      - postgres
      - rabbitmq
      - minio
    networks:
      - argus-net
      - proxy-net
    logging: *json-logging

  argus-workers:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command: ["python", "-m", "remote_api.workers"]
    environment:
      LOGGER_API_DATABASE_URL: ${LOGGER_API_DATABASE_URL}
      LOGGER_API_RABBITMQ_URL: ${LOGGER_API_RABBITMQ_URL}
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - argus-net
    logging: *json-logging

  argus-ai:
    build:
      context: .
      dockerfile: Dockerfile.ai
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      CODEX_MODEL: ${CODEX_MODEL:-gpt-5.4}
      CODEX_REASONING: ${CODEX_REASONING:-medium}
      CODEX_BRIDGE_DISABLE_KEYRING: "1"
      ARGUS_AI_NAME: ${ARGUS_AI_NAME:-Argus AI}
      ARGUS_PLATFORM_NAME: ${ARGUS_PLATFORM_NAME:-Argus}
      ARGUS_AI_LANGUAGE: ${ARGUS_AI_LANGUAGE:-en}
    volumes:
      - ${HOME}/.codex-bridge:/root/.codex-bridge
    depends_on:
      - postgres
    networks:
      - argus-net
    logging: *json-logging

  argus-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    restart: unless-stopped
    environment:
      ARGUS_API_BASE_URL: ${ARGUS_API_BASE_URL}
      ARGUS_AI_BASE_URL: http://argus-ai:8000
    depends_on:
      - argus-api
      - argus-ai
    networks:
      - argus-net
      - proxy-net
    logging: *json-logging

volumes:
  postgres-data:
  minio-data:

networks:
  argus-net:
    driver: bridge
  proxy-net:
    external: true
