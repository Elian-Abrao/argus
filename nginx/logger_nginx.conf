map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Sanitized reference template for public repositories.
# Replace domains, certificate paths, and allowed networks with values from your environment.

upstream argus_api {
    server argus-api:8100;
}

upstream argus_dashboard {
    server argus-dashboard:8200;
}

# ========================
# Argus API — public endpoint
# ========================
server {
    listen 80;
    server_name api.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.your-domain.com;

    ssl_certificate     /etc/letsencrypt/your-domain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/your-domain/privkey.pem;

    # Nginx liveness (public)
    location = /health {
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ========================
    # Swagger / OpenAPI (restricted networks only)
    # ========================
    location ~ ^/(docs|openapi\.json|redoc|docs/oauth2-redirect)$ {
        # Example private network ranges
        allow 10.0.0.0/16;
        allow 10.1.0.0/16;
        allow 192.168.10.0/24;
        allow 192.168.20.0/24;

        # Local / container access
        allow 127.0.0.1;
        allow 172.16.0.0/12;

        deny all;

        proxy_pass http://argus_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================
    # API health (VPN-only)
    # ========================
    location = /api/health {
        allow 10.0.0.0/16;
        allow 10.1.0.0/16;
        allow 192.168.10.0/24;
        allow 192.168.20.0/24;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;

        proxy_pass http://argus_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================
    # Public ingest endpoints (POST/PATCH only)
    # ========================
    location ~ ^/api/(ingest|runs|logs/batch) {
        if ($request_method !~ ^(POST|PATCH)$) { return 405; }

        proxy_pass http://argus_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/runs/[^/]+/snapshots$ {
        if ($request_method !~ ^POST$) { return 405; }

        proxy_pass http://argus_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================
    # Private insights endpoints (VPN-only)
    # ========================
    location /api/insights/ {
        allow 10.0.0.0/16;
        allow 10.1.0.0/16;
        allow 192.168.10.0/24;
        allow 192.168.20.0/24;
        deny all;

        proxy_pass http://argus_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================
    # Agent endpoints (internal VMs via private network)
    # ========================
    location ~ ^/api/agent/ {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://argus_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # Block any other paths on the public API domain
    location / {
        return 403;
    }
}

# ========================
# Argus Dashboard
# ========================
server {
    listen 80;
    server_name monitor.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name monitor.your-domain.com;

    ssl_certificate     /etc/letsencrypt/your-domain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/your-domain/privkey.pem;

    location / {
        # Restrict access as needed — example: VPN-only
        # allow 10.8.8.0/24;
        # allow 127.0.0.1;
        # deny all;

        proxy_pass http://argus_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
